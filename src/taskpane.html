<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Tool for PowerPoint</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
  <div id="app">
    <header id="header">
      <h1>🤖 AI Tool for PowerPoint</h1>
      <div id="header-right">
        <span id="ai-badge" class="ai-off" title="AI mode OFF">🧠</span>
        <span id="ai-status-text" class="ai-status-off">AI OFF</span>
        <span id="status-indicator" class="status-disconnected">●</span>
      </div>
    </header>

    <section id="api-key-section">
      <div id="api-key-toggle">🔑 API Settings <span id="api-key-status"></span></div>
      <div id="api-key-body" style="display:none">
        <input id="api-key-input" type="password" placeholder="DeepSeek API key (sk-...)" />
        <button id="api-key-save">Save</button>
      </div>
    </section>

    <section id="confirm-bar" style="display:none">
      <span id="confirm-count"></span>
      <button id="confirm-apply" class="confirm-btn apply">✅ Apply</button>
      <button id="confirm-cancel" class="confirm-btn cancel">❌ Cancel</button>
    </section>

    <!-- OUTPUT: main log area, takes all remaining space -->
    <section id="output-section">
      <pre id="output-content">Ready. Select a slide to begin.</pre>
    </section>

    <!-- QUICK ACTIONS: collapsible -->
    <section id="quick-actions">
      <div id="actions-toggle">⚡ Quick Actions ▾</div>
      <div id="actions-grid" style="display:none">
        <button class="action-btn" data-action="listShapes">📐 Shapes</button>
        <button class="action-btn" data-action="listSlides">📑 Slides</button>
        <button class="action-btn" data-action="listMasters">🎨 Masters</button>
        <button class="action-btn" data-action="listLayouts">📋 Layouts</button>
        <button class="action-btn" data-action="getTheme">🌈 Theme</button>
        <button class="action-btn" data-action="modifySelectedShape">✏️ Modify</button>
        <button class="action-btn" data-action="insertTable">📊 Table</button>
        <button class="action-btn" data-action="insertChart">📈 Chart</button>
        <button class="action-btn" data-action="setSlideBackground">🎨 BG</button>
        <button class="action-btn" data-action="autoLayout">🔲 Arrange</button>
        <button class="action-btn" data-action="listThemes">🎨 Themes</button>
        <button class="action-btn" data-action="applyDesign">🎨 Design</button>
      </div>
    </section>

    <!-- COMMAND INPUT: fixed at bottom -->
    <section id="command-section">
      <div id="command-input-area">
        <textarea id="command-input" placeholder="Describe what you want..." rows="1"></textarea>
        <button id="send-btn" title="Ctrl+Enter">▶</button>
      </div>
      <div id="command-footer">
        <button id="clear-history-btn">🗑 Clear</button>
        <span id="history-count" style="display:none"></span>
      </div>
    </section>
  </div>
</body>
</html>
